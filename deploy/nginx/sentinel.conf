# =============================================================================
# Sentinel Health — nginx reverse proxy
# Routes /, /surgical/*, /insight/* to internal docker services
# =============================================================================

upstream landing {
    server landing:80;
}

upstream surgical {
    server surgical:8000;
}

upstream insight {
    server insight:8501;
}

server {
    listen 80;
    server_name _;

    # Allow large uploads (surgical accepts video files)
    client_max_body_size 200M;

    # ── Landing institucional ────────────────────────────────────────────
    location / {
        proxy_pass http://landing/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Sentinel Surgical (FastAPI) ──────────────────────────────────────
    # Strip /surgical prefix; the FastAPI app serves /, /health, /api/...
    location /surgical/ {
        rewrite ^/surgical/(.*)$ /$1 break;
        proxy_pass http://surgical;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /surgical;

        # Long timeout for video processing
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # ── Surgical static assets (CSS/JS/img) ──────────────────────────────
    # The surgical index.html uses absolute paths (/static/css/style.css,
    # /static/js/app.js). When the page is served under /surgical/, the
    # browser still requests /static/* from the root origin. Forward those
    # to the surgical container.
    location /static/ {
        proxy_pass http://surgical;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Surgical JSON API (used by app.js) ───────────────────────────────
    # The JS does fetch('/api/...') with absolute paths. Forward to surgical.
    location /api/ {
        proxy_pass http://surgical;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Same timeouts as /surgical/ (video upload may take a while)
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        client_max_body_size 200M;
    }

    # ── Sentinel Insight (Streamlit) ─────────────────────────────────────
    # Streamlit is configured with STREAMLIT_SERVER_BASE_URL_PATH=/insight
    # so we pass /insight/* through to the upstream without rewriting.
    # NOTE: when an `upstream` block is declared above, proxy_pass URL must
    # NOT include the port (it's defined in the upstream).
    location /insight/ {
        proxy_pass http://insight/insight/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Streamlit uses websockets for live updates
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Keep websocket alive
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
