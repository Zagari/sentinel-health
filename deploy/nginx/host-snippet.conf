# =============================================================================
# Sentinel Health — Host nginx reverse proxy snippet
# =============================================================================
#
# Use este arquivo quando o host (físico/VM/EC2) já tem um nginx rodando na
# porta 80 e você quer que ELE direcione tráfego pro sentinel rodando em
# 127.0.0.1:8100 (via docker-compose.behind-proxy.yml).
#
# Como instalar:
#
#   1. Copie este arquivo para o host:
#        sudo cp host-snippet.conf /etc/nginx/conf.d/sentinel.conf
#
#   2. Ajuste a linha `server_name` para o seu domínio (ou _ para default).
#
#   3. Se já tem outra `map $http_upgrade ...` em algum lugar do http {} do
#      host nginx, REMOVA o bloco `map` deste arquivo (não pode duplicar).
#
#   4. Teste e reload:
#        sudo nginx -t
#        sudo systemctl reload nginx
#
# Pré-requisito: a stack do sentinel precisa estar rodando com o override
#                docker-compose.behind-proxy.yml para escutar em 127.0.0.1:8100.
# =============================================================================

# ─── WebSocket upgrade map ───────────────────────────────────────────────────
# Precisa estar no contexto http {} (ou seja, FORA de qualquer server {}).
# Em Debian/Ubuntu, arquivos em /etc/nginx/conf.d/ são incluídos dentro de
# http {} por default — então este map fica no lugar certo.
# Se o seu host nginx já tem este map em outro arquivo, REMOVA estas 4 linhas.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ─── HTTPS (opcional, descomentar quando tiver TLS) ──────────────────────────
# Redireciona 80 → 443. Comente o `server { listen 80; ... }` HTTP-puro abaixo
# quando habilitar este bloco.
#
# server {
#     listen 80;
#     server_name sentinel.example.com;
#     return 301 https://$host$request_uri;
# }

# ─── Server block principal ──────────────────────────────────────────────────
server {
    listen 80;
    # listen 443 ssl http2;                 # descomentar para HTTPS
    server_name sentinel.example.com;       # ← AJUSTAR para seu domínio (ou _)

    # ssl_certificate     /etc/letsencrypt/live/sentinel.example.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/sentinel.example.com/privkey.pem;
    # ssl_protocols       TLSv1.2 TLSv1.3;
    # ssl_ciphers         HIGH:!aNULL:!MD5;

    # Surgical aceita uploads de vídeo (até ~200 MB)
    client_max_body_size 200M;

    # Tudo cai aqui — o nginx interno do sentinel (em 127.0.0.1:8100) faz o
    # roteamento por path (/, /surgical/*, /insight/*, /api/*, /static/*, ...)
    location / {
        proxy_pass http://127.0.0.1:8100;

        # Headers padrão de reverse proxy
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # WebSocket support — IMPORTANTE para o Sentinel Insight (Streamlit).
        # Sem estas 3 linhas, a UI do Insight carrega mas a sessão Streamlit
        # nunca se conecta de fato.
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;

        # Long timeouts: Surgical processa vídeos pesados, Insight mantém
        # websocket aberto enquanto o usuário usa a UI.
        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;
    }
}
